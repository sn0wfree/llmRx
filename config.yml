server:
  port: 8787
  log_level: info

database:
  driver: sqlite
  dsn: data/llmrx.db

# Secrets: at-rest encryption of channel API keys (AES-256-GCM).
# In production, set LLMRX_KEY_MASTER in the environment (32-byte
# hex, generate with `openssl rand -hex 32`). For local dev only,
# dev_allow_plaintext_keys: true lets the gateway start without a
# master key — channel keys are stored in plaintext. NEVER enable
# this on any non-localhost deployment.
secrets:
  key_master_env: LLMRX_KEY_MASTER
  dev_allow_plaintext_keys: false

tokens:
  - key: sk-test-token-123
    name: test-token
    models: [deepseek-chat, deepseek-reasoner]

channels:
  - name: deepseek-main
    provider: deepseek
    base_url: https://api.deepseek.com/v1
    keys:
      - ${DEEPSEEK_API_KEY}
    models:
      - deepseek-chat
      - deepseek-reasoner
    priority: 10
    input_price_per_1m: 0.14
    output_price_per_1m: 0.42
    max_failures: 5
    reset_timeout_ms: 60000

  - name: minimax-main
    provider: minimax
    base_url: https://api.minimax.io/v1
    keys:
      - ${MINIMAX_API_KEY}
    models:
      - MiniMax-Text-01
    priority: 5
    input_price_per_1m: 0.10
    output_price_per_1m: 0.30
    max_failures: 5
    reset_timeout_ms: 60000
