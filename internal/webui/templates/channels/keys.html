{{define "channels_keys_body"}}<div class="mb-6">
  <a href="/admin/channels" class="text-sm text-gray-500 hover:text-gray-700">← 返回通道列表</a>
  <h1 class="text-2xl font-bold text-gray-900 mt-2">{{.Channel.Name}} <span class="text-base font-normal text-gray-500">/ API Keys</span></h1>
</div>

<form hx-post="/admin/channels/{{.Channel.ID}}/keys"
      hx-target="#keys-list"
      hx-swap="afterbegin"
      hx-on::after-request="this.reset()"
      class="bg-white shadow rounded-lg p-6 mb-6">
  <h2 class="text-lg font-medium text-gray-900 mb-4">添加 API Key</h2>
  <div class="flex gap-3">
    <input type="text" name="key" required placeholder="sk-..."
           class="flex-1 px-3 py-2 border border-gray-300 rounded-md font-mono text-sm">
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">
      添加
    </button>
  </div>
</form>

<div id="keys-list" class="bg-white shadow rounded-lg overflow-hidden">
  {{range .Keys}}
  <div id="key-row-{{.ID}}" class="flex items-center justify-between p-4 border-b last:border-b-0">
    <div>
      <code class="text-sm bg-gray-50 px-2 py-1 rounded font-mono">{{.KeyMasked}}</code>
      <span class="ml-3 text-xs text-gray-500">创建于 {{formatTime .CreatedAt}}</span>
    </div>
    <button hx-delete="/admin/channels/{{$.Channel.ID}}/keys/{{.ID}}"
            hx-target="#key-row-{{.ID}}"
            hx-swap="outerHTML"
            hx-confirm="确定删除此 Key？"
            class="text-red-600 hover:text-red-900 text-sm">删除</button>
  </div>
  {{else}}
  <div class="p-8 text-center text-sm text-gray-500">还没有 API Keys</div>
  {{end}}
</div>
<div id="flash"></div>{{end}}
