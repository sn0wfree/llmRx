{{define "config_yaml_body"}}<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-900">配置</h1>
  <p class="mt-1 text-sm text-gray-500">编辑 config.yml 并热重载</p>
</div>

{{if .FormError}}
<div class="mb-4 p-3 rounded bg-red-100 text-red-800 border border-red-200 text-sm">{{.FormError}}</div>
{{end}}

{{if .Saved}}
<div id="flash" hx-swap-oob="innerHTML" class="mb-4 p-3 rounded bg-green-100 text-green-800 border border-green-200 text-sm">配置已保存并热重载</div>
{{end}}

<form method="POST" action="/admin/config" class="bg-white shadow rounded-lg p-6">
  <label class="block text-sm font-medium text-gray-700 mb-2">YAML 配置</label>
  <textarea name="yaml" rows="30"
            class="block w-full font-mono text-xs px-3 py-2 border border-gray-300 rounded-md">{{.ConfigYAML}}</textarea>
  <div class="flex justify-end gap-3 pt-4 border-t mt-4">
    <a href="/admin/effective" class="px-4 py-2 text-gray-700 hover:text-gray-900 text-sm">查看运行时</a>
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">保存</button>
  </div>
</form>
<div id="flash"></div>{{end}}
