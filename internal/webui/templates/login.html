{{define "login_body"}}<div class="w-full max-w-md">
  <div class="bg-white shadow-lg rounded-lg p-8">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900">llmRx</h1>
      <p class="text-sm text-gray-500 mt-1">Admin Console</p>
    </div>
    <form hx-post="/admin/login"
          hx-target="#login-error"
          hx-swap="innerHTML"
          hx-indicator="#login-btn"
          class="space-y-4">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">用户名</label>
        <input type="text" name="username" id="username" required autocomplete="username"
               value="{{.Username}}"
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">密码</label>
        <input type="password" name="password" id="password" required autocomplete="current-password"
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div id="login-error">
        {{if .Error}}
        <div class="p-3 rounded bg-red-100 text-red-800 border border-red-200 text-sm">{{.Error}}</div>
        {{end}}
      </div>
      <button type="submit" id="login-btn"
              class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
        <span class="htmx-indicator mr-2">
          <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </span>
        登录
      </button>
    </form>
  </div>
</div>
<script>
document.body.addEventListener('htmx:afterRequest', function(evt) {
  if (evt.detail.pathInfo && evt.detail.pathInfo.requestPath === '/admin/login' && evt.detail.successful) {
    setTimeout(function() { window.location.href = '/admin/dashboard'; }, 100);
  }
});
</script>{{end}}
