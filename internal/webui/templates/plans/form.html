{{define "plans_form_body"}}<div class="mb-6">
  <a href="/admin/plans" class="text-sm text-gray-500 hover:text-gray-700">← 返回列表</a>
  <h1 class="text-2xl font-bold text-gray-900 mt-2">
    {{if .Plan}}编辑计划{{else}}新建计划{{end}}
  </h1>
</div>

{{if .FormError}}
<div class="mb-4 p-3 rounded bg-red-100 text-red-800 border border-red-200 text-sm">{{.FormError}}</div>
{{end}}

<form method="POST"
      action="{{if .Plan}}/admin/plans/{{.Plan.ID}}{{else}}/admin/plans{{end}}"
      class="bg-white shadow rounded-lg p-6 space-y-6 max-w-2xl">
  {{if .Plan}}<input type="hidden" name="_method" value="PUT">{{end}}

  <div>
    <label class="block text-sm font-medium text-gray-700">名称 *</label>
    <input type="text" name="name" required value="{{or .FormData.Name .Plan.Name}}"
           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">预算 (USD)</label>
      <input type="number" step="0.01" name="budget_usd" value="{{or .FormData.BudgetStr (printf "%.2f" .Plan.BudgetUSD)}}"
             class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm" placeholder="0 = 不限">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">加价倍数</label>
      <input type="number" step="0.01" name="markup_ratio" value="{{or .FormData.MarkupStr (printf "%.2f" .Plan.MarkupRatio)}}"
             class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm" placeholder="1.0 = 不加价">
    </div>
  </div>

  <div>
    <label class="flex items-center">
      <input type="checkbox" name="status" value="1"
             {{if or (eq .FormData.Status "1") (eq .Plan.Status 1) (and (not .FormData) (not .Plan))}}checked{{end}}
             class="rounded border-gray-300">
      <span class="ml-2 text-sm text-gray-700">启用</span>
    </label>
  </div>

  <div class="flex justify-end gap-3 pt-4 border-t">
    <a href="/admin/plans" class="px-4 py-2 text-gray-700 hover:text-gray-900 text-sm">取消</a>
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">
      {{if .Plan}}保存{{else}}创建{{end}}
    </button>
  </div>
</form>
<div id="flash"></div>{{end}}
