{{define "plans_list_body"}}<div class="mb-6 flex justify-between items-center">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">计划管理</h1>
    <p class="mt-1 text-sm text-gray-500">管理计费套餐 (Budget / Markup)</p>
  </div>
  <a href="/admin/plans/new" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">
    + 新建计划
  </a>
</div>

<div class="bg-white shadow rounded-lg overflow-hidden">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">名称</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">预算 ($)</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">已用 ($)</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">加价倍数</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">操作</th>
      </tr>
    </thead>
    <tbody id="plan-table-body" class="bg-white divide-y divide-gray-200">
      {{range .Plans}}
      <tr id="plan-row-{{.ID}}">
        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{.Name}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-right text-gray-700">{{printf "%.2f" .BudgetUSD}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-right text-gray-700">{{printf "%.4f" .UsedUSD}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-right text-gray-700">{{printf "%.2fx" .MarkupRatio}}</td>
        <td class="px-6 py-4 whitespace-nowrap">{{statusBadge .Status}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
          <a href="/admin/plans/{{.ID}}/edit" class="text-blue-600 hover:text-blue-900 mr-3">编辑</a>
          <button hx-delete="/admin/plans/{{.ID}}"
                  hx-target="#plan-row-{{.ID}}"
                  hx-swap="outerHTML"
                  hx-confirm="确定删除计划 {{.Name}}？将解绑所有关联 Token。"
                  class="text-red-600 hover:text-red-900">删除</button>
        </td>
      </tr>
      {{else}}
      <tr><td colspan="6" class="px-6 py-12 text-center text-sm text-gray-500">
        还没有计划。<a href="/admin/plans/new" class="text-blue-600 hover:underline">新建第一个计划</a>
      </td></tr>
      {{end}}
    </tbody>
  </table>
</div>
<div id="flash"></div>{{end}}
