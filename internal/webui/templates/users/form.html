{{define "users_form_body"}}<div class="mb-6">
  <a href="/admin/users" class="text-sm text-gray-500 hover:text-gray-700">← 返回列表</a>
  <h1 class="text-2xl font-bold text-gray-900 mt-2">新建用户</h1>
</div>

{{if .FormError}}
<div class="mb-4 p-3 rounded bg-red-100 text-red-800 border border-red-200 text-sm">{{.FormError}}</div>
{{end}}

<form method="POST" action="/admin/users" class="bg-white shadow rounded-lg p-6 space-y-6 max-w-md">
  <div>
    <label class="block text-sm font-medium text-gray-700">用户名 *</label>
    <input type="text" name="username" required value="{{.FormData.Username}}"
           autocomplete="off"
           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700">密码 *</label>
    <input type="password" name="password" required minlength="6" autocomplete="new-password"
           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700">Role</label>
    <select name="role" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
      <option value="0" {{if eq .FormData.Role "0"}}selected{{end}}>User</option>
      <option value="10" {{if eq .FormData.Role "10"}}selected{{end}}>Admin</option>
    </select>
  </div>
  <div class="flex justify-end gap-3 pt-4 border-t">
    <a href="/admin/users" class="px-4 py-2 text-gray-700 hover:text-gray-900 text-sm">取消</a>
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">创建</button>
  </div>
</form>
<div id="flash"></div>{{end}}

{{define "users_password_body"}}<div class="mb-6">
  <a href="/admin/users" class="text-sm text-gray-500 hover:text-gray-700">← 返回列表</a>
  <h1 class="text-2xl font-bold text-gray-900 mt-2">修改密码：{{.User.Username}}</h1>
</div>

{{if .FormError}}
<div class="mb-4 p-3 rounded bg-red-100 text-red-800 border border-red-200 text-sm">{{.FormError}}</div>
{{end}}

<form method="POST" action="/admin/users/{{.User.ID}}/password"
      class="bg-white shadow rounded-lg p-6 space-y-6 max-w-md">
  <div>
    <label class="block text-sm font-medium text-gray-700">新密码 *</label>
    <input type="password" name="password" required minlength="6" autocomplete="new-password"
           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
  </div>
  <div class="flex justify-end gap-3 pt-4 border-t">
    <a href="/admin/users" class="px-4 py-2 text-gray-700 hover:text-gray-900 text-sm">取消</a>
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">修改</button>
  </div>
</form>
<div id="flash"></div>{{end}}
