{{define "users_list_body"}}<div class="mb-6 flex justify-between items-center">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">用户管理</h1>
    <p class="mt-1 text-sm text-gray-500">管理 Admin 登录账号</p>
  </div>
  <a href="/admin/users/new" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">
    + 新建用户
  </a>
</div>

<div class="bg-white shadow rounded-lg overflow-hidden">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">用户名</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建时间</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">操作</th>
      </tr>
    </thead>
    <tbody id="user-table-body" class="bg-white divide-y divide-gray-200">
      {{range .Users}}
      <tr id="user-row-{{.ID}}">
        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{.Username}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{.Role}}</td>
        <td class="px-6 py-4 whitespace-nowrap">{{statusBadge .Status}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{formatTime .CreatedAt}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
          <a href="/admin/users/{{.ID}}/password" class="text-blue-600 hover:text-blue-900 mr-3">改密</a>
          {{if ne .Username "admin"}}
          <button hx-delete="/admin/users/{{.ID}}"
                  hx-target="#user-row-{{.ID}}"
                  hx-swap="outerHTML"
                  hx-confirm="确定删除用户 {{.Username}}？"
                  class="text-red-600 hover:text-red-900">删除</button>
          {{end}}
        </td>
      </tr>
      {{else}}
      <tr><td colspan="5" class="px-6 py-12 text-center text-sm text-gray-500">还没有用户</td></tr>
      {{end}}
    </tbody>
  </table>
</div>
<div id="flash"></div>{{end}}
